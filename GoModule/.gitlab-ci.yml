# =============================================================================
# .gitlab-ci.yml — репозиторий cr-assistant
#
# cr-assistant — одноразовый CI job, НЕ long-running сервис.
# Pipeline: lint → test → build → push в Docker Hub.
# Образ затем подключается в других репозиториях через:
#   image: your-dockerhub-user/cr-assistant:latest
#
# Переменные (Settings → CI/CD → Variables):
#   DOCKERHUB_USER      — логин Docker Hub (например: mycompany)
#   DOCKERHUB_TOKEN     — Access Token Docker Hub (не пароль!)
#                         Создать: hub.docker.com → Account Settings → Security
# =============================================================================

stages:
  - test
  - build

variables:
  # Docker Hub образ: dockerhub-user/cr-assistant
  IMAGE: ${DOCKERHUB_USER}/cr-assistant
  TAG: $CI_COMMIT_SHORT_SHA

# =============================================================================
# STAGE: test
# =============================================================================

lint:
  stage: test
  image: golangci/golangci-lint:v1.59-alpine
  script:
    - golangci-lint run ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# STAGE: build
#
# Собираем через kaniko (без DinD, работает с docker executor).
# Пушим в Docker Hub два тега: SHA коммита и latest.
#
# После успешного пуша образ доступен:
#   docker pull your-dockerhub-user/cr-assistant:latest
#
# Подключение в других репозиториях GitLab:
#   cr-review:
#     stage: review
#     image: your-dockerhub-user/cr-assistant:latest
#     variables:
#       CI_SERVER_URL: $CI_SERVER_URL
#       CI_JOB_TOKEN: $CI_JOB_TOKEN
#       CR_BOT_TOKEN: $CR_BOT_TOKEN
#       LLM_SERVICE_URL: "http://python-processor:8080"
#       STANDARDS_SERVICE_URL: "http://standards-service:9090"
#     rules:
#       - if: $CI_PIPELINE_SOURCE == "merge_request_event"
# =============================================================================

build-and-push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    # Аутентификация в Docker Hub через Access Token
    - >
      echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(printf '%s:%s' "$DOCKERHUB_USER" "$DOCKERHUB_TOKEN" | base64 | tr -d '\n')\"}}}"
      > /kaniko/.docker/config.json
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${IMAGE}:${TAG}"
      --destination "${IMAGE}:latest"
      --cache=true
      --cache-ttl=24h
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  needs:
    - lint