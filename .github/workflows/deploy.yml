name: Build and Push Docker Images

on:
  push:
    branches: [ "main", "master" ] # Запуск при пуше в эти ветки

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #Сборка и отправка Go бэкенда
      - name: Build and push Go Backend
        uses: docker/build-push-action@v5
        with:
          context: ./INS/GoModule
          file: ./INS/GoModule/Dockerfile
          push: true
          tags: sam228269/tool:latest

      # Сборка и отправка Python ЛЛМ-модуля
      - name: Build and push Python Processor
        uses: docker/build-push-action@v5
        with:
          context: ./INS/python_processor
          file: ./INS/python_processor/Dockerfile
          push: true
          tags: sam228269/tool-processor:latest 
